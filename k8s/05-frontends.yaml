apiVersion: v1
kind: Service
metadata:
  name: lumora-admin
  namespace: lumora
spec:
  ports:
    - port: 3000
      targetPort: 3000
  selector:
    app: admin-frontend
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: lumora-admin
  namespace: lumora
spec:
  replicas: 1
  selector:
    matchLabels:
      app: admin-frontend
  template:
    metadata:
      labels:
        app: admin-frontend
    spec:
      containers:
        - name: admin-frontend
          image: lumora-admin:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          env:
            - name: PORT
              value: "3000"
          envFrom:
            - configMapRef:
                name: lumora-config
---
apiVersion: v1
kind: Service
metadata:
  name: lumora-chatbot
  namespace: lumora
spec:
  ports:
    - port: 3000
      targetPort: 3000
  selector:
    app: chatbot-frontend
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: lumora-chatbot
  namespace: lumora
spec:
  replicas: 1
  selector:
    matchLabels:
      app: chatbot-frontend
  template:
    metadata:
      labels:
        app: chatbot-frontend
    spec:
      containers:
        - name: chatbot
          image: lumora-chatbot:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          env:
            - name: PORT
              value: "3000"
          envFrom:
            - configMapRef:
                name: lumora-config
