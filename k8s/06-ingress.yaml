apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: lumora-ingress
  namespace: lumora
  annotations:
    # Fix #5: Sadece Traefik annotation'ları (nginx karışıklığı temizlendi)
    kubernetes.io/ingress.class: "traefik"
    traefik.ingress.kubernetes.io/buffering: |
      maxrequestbodybytes: 52428800
    traefik.ingress.kubernetes.io/custom-request-headers: "X-Forwarded-Proto:https"
spec:
  tls:
    - hosts:
        - lumoraboutique.com
        - admin.lumoraboutique.com
      secretName: lumoraboutique-tls
  rules:
    - host: lumoraboutique.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: lumora-backend
                port:
                  number: 8000
          # Fix #6: Duplicate /socket.io path kaldırıldı
          # /socket.io Prefix olarak zaten /socket.io/ veya /socket.io/xyz'i kapsar
          - path: /socket.io
            pathType: Prefix
            backend:
              service:
                name: lumora-backend
                port:
                  number: 8000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: lumora-chatbot
                port:
                  number: 3000
    - host: admin.lumoraboutique.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: lumora-admin
                port:
                  number: 3000
