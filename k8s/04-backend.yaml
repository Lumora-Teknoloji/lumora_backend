apiVersion: v1
kind: Service
metadata:
  name: lumora-backend
  namespace: lumora
spec:
  ports:
    - port: 8000
      targetPort: 8000
  selector:
    app: backend
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: lumora-backend
  namespace: lumora
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          # İmaj yerel sistemde build edilip kullanılacaksa imagePullPolicy: Never
          image: lumora-backend:latest
          imagePullPolicy: IfNotPresent
          command: ["python", "run_server.py"]
          ports:
            - containerPort: 8000
          env:
            - name: HOST
              value: "0.0.0.0"
          envFrom:
            - configMapRef:
                name: lumora-config
            - secretRef:
                name: lumora-secret
