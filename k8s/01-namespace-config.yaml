# ─────────────────────────────────────────────────────────────────────────────
# 01-namespace-config.yaml — Namespace + ConfigMap + Secret (TEMPLATE)
#
# ⚠️  Bu dosya bir TEMPLATE'tir.  Secret değerlerini doldurmayın!
#     Gerçek secret'ları aşağıdaki komutla oluşturun:
#
#   kubectl create secret generic lumora-secret -n lumora \
#     --from-literal=POSTGRESQL_DATABASE=lumora_db \
#     --from-literal=POSTGRESQL_USERNAME=postgres \
#     --from-literal=POSTGRESQL_PASSWORD='<GERÇEK_ŞIFRE>' \
#     --from-literal=DATABASE_URL='postgresql://postgres:<GERÇEK_ŞIFRE>@lumora-postgres:5432/lumora_db' \
#     --from-literal=JWT_SECRET='<GERÇEK_JWT_SECRET>' \
#     --from-literal=AGENT_SECRET='<GERÇEK_AGENT_SECRET>' \
#     --from-literal=NEXT_PUBLIC_AGENT_SECRET='<GERÇEK_AGENT_SECRET>' \
#     --from-literal=INTERNAL_API_KEY='<GERÇEK_INTERNAL_KEY>' \
#     --from-literal=INTELLIGENCE_INTERNAL_KEY='<GERÇEK_INTERNAL_KEY>' \
#     --from-literal=OPENAI_API_KEY='<GERÇEK_OPENAI_KEY>' \
#     --from-literal=FAL_API_KEY='<GERÇEK_FAL_KEY>'
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Namespace
metadata:
  name: lumora
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: lumora-config
  namespace: lumora
data:
  APP_ENV: "production"
  NODE_ENV: "production"
  PORT: "8000"
  
  # Fix #3: K8s iç DNS kullan (eski: 159.195.68.219)
  POSTGRESQL_HOST: "lumora-postgres"
  POSTGRESQL_PORT: "5432"
  POSTGRESQL_DATABASE: "lumora_db"
  POSTGRESQL_USERNAME: "postgres"
  
  REDIS_URL: "redis://lumora-redis:6379"
  
  NEXT_PUBLIC_BACKEND_URL: "https://lumoraboutique.com/api"
  NEXT_PUBLIC_API_URL: "https://lumoraboutique.com/api"
  
  BACKEND_URL: "http://lumora-backend:8000"
  VPS_BACKEND_URL: "http://lumora-backend:8000/api"
  VPS_URL: "http://lumora-backend:8000/api"
  
  JWT_ALGORITHM: "HS256"
  ACCESS_TOKEN_EXPIRE_MINUTES: "120"

  # Fix #4: CORS — sadece izin verilen domainler
  CORS_ORIGINS: "https://lumoraboutique.com,https://www.lumoraboutique.com,https://admin.lumoraboutique.com"
  ALLOWED_HOSTS: "lumoraboutique.com,admin.lumoraboutique.com"
  
  INTELLIGENCE_HOST: "0.0.0.0"
  INTELLIGENCE_PORT: "8001"
  INTELLIGENCE_URL: "http://lumora-intelligence:8001"
  BACKEND_CALLBACK_URL: "http://lumora-backend:8000/api/intelligence/callback"

  NIGHTLY_BATCH_HOUR: "2"
  NIGHTLY_BATCH_MINUTE: "0"
  WEEKLY_RETRAIN_DAY: "sun"
  WEEKLY_RETRAIN_HOUR: "3"
  CATBOOST_ITERATIONS: "500"
  CATBOOST_LEARNING_RATE: "0.05"
  CATBOOST_DEPTH: "6"
  MIN_DAYS_FOR_CATBOOST: "30"
  
  PROXY_ENABLED: "false"
  TZ: "Europe/Istanbul"
