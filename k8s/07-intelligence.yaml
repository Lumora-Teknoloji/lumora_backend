apiVersion: v1
kind: Service
metadata:
  name: lumora-intelligence
  namespace: lumora
spec:
  ports:
    - port: 8001
      targetPort: 8001
  selector:
    app: intelligence
---
# Fix #2: PVC — model + state dosyaları pod restart'ında korunur
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: intelligence-models-pvc
  namespace: lumora
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: intelligence-data-pvc
  namespace: lumora
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: lumora-intelligence
  namespace: lumora
spec:
  replicas: 1
  selector:
    matchLabels:
      app: intelligence
  template:
    metadata:
      labels:
        app: intelligence
    spec:
      containers:
        - name: intelligence
          image: lumora-intelligence:latest
          imagePullPolicy: IfNotPresent
          command: ["python", "run_server.py"]
          ports:
            - containerPort: 8001
          envFrom:
            - configMapRef:
                name: lumora-config
            - secretRef:
                name: lumora-secret
          # Fix #7: Resource limits — CatBoost eğitimi bellek yoğun
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
          # Fix #8: Health probes
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          volumeMounts:
            - name: db-volume
              mountPath: /app/db/data
            - name: models-volume
              mountPath: /app/models/saved
      volumes:
        # Fix #2: emptyDir → PVC (persist across pod restarts)
        - name: db-volume
          persistentVolumeClaim:
            claimName: intelligence-data-pvc
        - name: models-volume
          persistentVolumeClaim:
            claimName: intelligence-models-pvc
