apiVersion: v1
kind: Service
metadata:
  name: lumora-intelligence
  namespace: lumora
spec:
  ports:
    - port: 8001
      targetPort: 8001
  selector:
    app: intelligence
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: lumora-intelligence
  namespace: lumora
spec:
  replicas: 1
  selector:
    matchLabels:
      app: intelligence
  template:
    metadata:
      labels:
        app: intelligence
    spec:
      containers:
        - name: intelligence
          image: lumora-intelligence:latest
          imagePullPolicy: IfNotPresent
          command: ["python", "run_server.py"]
          ports:
            - containerPort: 8001
          envFrom:
            - configMapRef:
                name: lumora-config
            - secretRef:
                name: lumora-secret
          volumeMounts:
            - name: db-volume
              mountPath: /app/db/data
            - name: models-volume
              mountPath: /app/models/saved
      volumes:
        - name: db-volume
          emptyDir: {}
        - name: models-volume
          emptyDir: {}
