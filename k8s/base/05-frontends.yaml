apiVersion: v1
kind: Service
metadata:
  name: lumora-admin
  namespace: lumora
spec:
  ports:
    - port: 3000
      targetPort: 3000
  selector:
    app: admin-frontend
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: lumora-admin
  namespace: lumora
spec:
  replicas: 1
  selector:
    matchLabels:
      app: admin-frontend
  template:
    metadata:
      labels:
        app: admin-frontend
    spec:
      containers:
        - name: admin-frontend
          image: lumora-admin:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          env:
            - name: PORT
              value: "3000"
          envFrom:
            - configMapRef:
                name: lumora-config
          # Fix #7: Resource limits
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "300m"
          # Fix #8: TCP probe (Next.js uygulaması)
          readinessProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 20
---
