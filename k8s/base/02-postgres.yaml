apiVersion: v1
kind: Service
metadata:
  name: lumora-postgres
  namespace: lumora
spec:
  ports:
    - port: 5432
      targetPort: 5432
  selector:
    app: postgres
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: lumora-postgres
  namespace: lumora
spec:
  serviceName: lumora-postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: pgvector/pgvector:pg16
          ports:
            - containerPort: 5432
          env:
            # Fix #9: Secret'taki key isimleri artık doğru eşleşiyor
            # POSTGRESQL_DATABASE ve POSTGRESQL_USERNAME configMap'te tutulur.
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: lumora-config
                  key: POSTGRESQL_DATABASE
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: lumora-config
                  key: POSTGRESQL_USERNAME
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: lumora-secret
                  key: POSTGRESQL_PASSWORD
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          # Fix #7: Resource limits
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          # Fix #8: Health probe
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - postgres
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - postgres
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes: [ "ReadWriteOnce" ]
        resources:
          requests:
            storage: 10Gi
