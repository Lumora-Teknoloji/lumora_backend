version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: lumora_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: lumora
      POSTGRES_PASSWORD: lumora_dev_pass
      POSTGRES_DB: lumora_db
    ports:
      - "5432:5432"
    volumes:
      - lumora_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lumora -d lumora_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: lumora_redis
    restart: unless-stopped
    command: redis-server --save "" --appendonly no
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  lumora_pgdata:
