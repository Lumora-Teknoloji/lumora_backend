services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: lumora-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRESQL_DATABASE:-lumora_db}
      POSTGRES_USER: ${POSTGRESQL_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${POSTGRESQL_PASSWORD:-postgres123}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRESQL_USERNAME:-postgres}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lumora-network

  redis:
    image: redis:7-alpine
    container_name: lumora-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - lumora-network

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lumora-backend
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${PORT:-8000}:8000"
    environment:
      POSTGRESQL_HOST: postgres
      POSTGRESQL_PORT: 5432
      TZ: Europe/Istanbul
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - lumora-network
    volumes:
      - .:/app
      - ../Scrapper:/Scrapper
    command: python run_server.py

  admin-frontend:
    build:
      context: ../admin_frontend
      dockerfile: Dockerfile
    container_name: lumora-admin
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://backend:8000/api
      BACKEND_URL: http://backend:8000
    depends_on:
      - backend
    networks:
      - lumora-network

  chatbot-frontend:
    build:
      context: ../chatbot_frontend
      dockerfile: Dockerfile
    container_name: lumora-chatbot
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://backend:8000/api
    depends_on:
      - backend
    networks:
      - lumora-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  lumora-network:
    driver: bridge
